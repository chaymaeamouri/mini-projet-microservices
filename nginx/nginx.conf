# Configuration de base Nginx pour le reverse proxy (en développement local)
# À utiliser avec Nginx sur Windows ou via Docker

server {
    listen 80;
    server_name localhost;

    # Frontend (React)
    location / {
        proxy_pass http://localhost:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Authentication
    location /api/auth {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Students
    location /api/students {
        proxy_pass http://localhost:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
