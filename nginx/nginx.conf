# Configuration Nginx - API Gateway / Reverse Proxy
# Microservices Architecture

server {
    listen 80;
    server_name localhost;

    # Frontend (React Vite - dev mode)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API Authentication Microservice
    location /api/auth/ {
        proxy_pass http://localhost:8001/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $http_content_type;
    }

    # API Status Authentication
    location /api/status {
        proxy_pass http://localhost:8001/api/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Students/Patients Microservice
    location /api/patients/ {
        proxy_pass http://localhost:8002/api/patients/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

